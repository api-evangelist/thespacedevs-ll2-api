naftiko: "1.0.0-alpha1"

info:
  label: "TheSpaceDevs Launch Library 2 API"
  description: "Comprehensive space launch and events database providing data on rocket launches, astronauts, spacecraft, space stations, and crewed spaceflight."
  tags:
    - Space
    - Launches
    - Rockets
    - Astronauts
    - Spacecraft
    - Space Stations
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SPACEDEVS_TOKEN: SPACEDEVS_TOKEN

capability:
  consumes:
    - type: http
      namespace: ll2
      baseUri: https://ll.thespacedevs.com
      description: "TheSpaceDevs Launch Library 2 API v2.3.0."
      authentication:
        type: apikey
        key: Authorization
        value: "Token {{SPACEDEVS_TOKEN}}"
        placement: header
      resources:
        - name: launches-upcoming
          path: /2.3.0/launches/upcoming/
          description: "Upcoming rocket launches."
          operations:
            - name: list-upcoming-launches
              method: GET
              description: "List upcoming rocket launches worldwide."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results (max 100)."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search by launch name."
                - name: mode
                  in: query
                  type: string
                  required: false
                  description: "Response detail level (list, normal, detailed)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: launches-previous
          path: /2.3.0/launches/previous/
          description: "Previous rocket launches."
          operations:
            - name: list-previous-launches
              method: GET
              description: "List previously completed rocket launches."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: launches
          path: /2.3.0/launches/
          description: "All rocket launches."
          operations:
            - name: list-launches
              method: GET
              description: "List all rocket launches with filtering."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: launch-by-id
          path: /2.3.0/launches/{id}/
          description: "A specific rocket launch."
          operations:
            - name: get-launch
              method: GET
              description: "Get detailed data for a specific launch."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Launch UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events-upcoming
          path: /2.3.0/events/upcoming/
          description: "Upcoming space events."
          operations:
            - name: list-upcoming-events
              method: GET
              description: "List upcoming space events (launches, landings, announcements)."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: astronauts
          path: /2.3.0/astronauts/
          description: "Astronaut database."
          operations:
            - name: list-astronauts
              method: GET
              description: "List astronauts with filtering by status, agency, nationality."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search by astronaut name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: astronaut-by-id
          path: /2.3.0/astronauts/{id}/
          description: "Individual astronaut data."
          operations:
            - name: get-astronaut
              method: GET
              description: "Get detailed data for a specific astronaut."
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Astronaut ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: space-stations
          path: /2.3.0/space_stations/
          description: "Space stations database."
          operations:
            - name: list-space-stations
              method: GET
              description: "List space stations with status and ownership data."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: agencies
          path: /2.3.0/agencies/
          description: "Space agencies database."
          operations:
            - name: list-agencies
              method: GET
              description: "List space agencies and launch providers."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
                - name: search
                  in: query
                  type: string
                  required: false
                  description: "Search by agency name or abbreviation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: pads
          path: /2.3.0/pads/
          description: "Launch pad database."
          operations:
            - name: list-pads
              method: GET
              description: "List launch pads worldwide."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: spacecraft
          path: /2.3.0/spacecraft/
          description: "Spacecraft database."
          operations:
            - name: list-spacecraft
              method: GET
              description: "List spacecraft with status and configuration data."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: celestial-bodies
          path: /2.3.0/celestial_bodies/
          description: "Celestial bodies database."
          operations:
            - name: list-celestial-bodies
              method: GET
              description: "List celestial bodies (planets, moons, asteroids)."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: spacewalks
          path: /2.3.0/spacewalks/
          description: "Spacewalk (EVA) records."
          operations:
            - name: list-spacewalks
              method: GET
              description: "List extravehicular activities (spacewalks/EVAs)."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ll2-rest
      resources:
        - path: /v1/launches/upcoming
          name: upcoming-launches
          description: "Upcoming rocket launches."
          operations:
            - method: GET
              name: list-upcoming-launches
              description: "List upcoming rocket launches."
              call: "ll2.list-upcoming-launches"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/launches/previous
          name: previous-launches
          description: "Previous rocket launches."
          operations:
            - method: GET
              name: list-previous-launches
              description: "List previous rocket launches."
              call: "ll2.list-previous-launches"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/launches/{id}
          name: launch
          description: "A specific rocket launch."
          operations:
            - method: GET
              name: get-launch
              description: "Get a specific launch."
              call: "ll2.get-launch"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/astronauts
          name: astronauts
          description: "Astronaut database."
          operations:
            - method: GET
              name: list-astronauts
              description: "List astronauts."
              call: "ll2.list-astronauts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ll2-mcp
      transport: http
      tools:
        - name: list-upcoming-launches
          description: "List upcoming rocket launches worldwide."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-upcoming-launches"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-previous-launches
          description: "List previously completed rocket launches."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-previous-launches"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-launch
          description: "Get detailed data for a specific rocket launch by UUID."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.get-launch"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-astronauts
          description: "List astronauts from the space database."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-astronauts"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-astronaut
          description: "Get detailed data for a specific astronaut."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.get-astronaut"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-space-stations
          description: "List orbital space stations."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-space-stations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-agencies
          description: "List space agencies and launch providers."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-agencies"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-upcoming-events
          description: "List upcoming space events."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-upcoming-events"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-spacecraft
          description: "List spacecraft in the database."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-spacecraft"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-spacewalks
          description: "List extravehicular activities (spacewalks/EVAs)."
          hints:
            readOnly: true
            idempotent: true
          call: "ll2.list-spacewalks"
          outputParameters:
            - type: object
              mapping: "$."
